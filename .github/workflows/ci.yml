name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  estructura:
    name: Estructura y enlaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validar estructura, secciones y enlaces internos
        run: python scripts/validar_estructura.py

      - name: Comprobar que el índice y el glosario están sincronizados
        run: |
          set -euo pipefail
          # Ambos se generan desde las clases: si alguien añade una clase y no
          # regenera, la documentación queda mintiendo. Aquí se detecta.
          python scripts/generar_indice.py
          python scripts/generar_glosario.py
          if ! git diff --quiet -- classes/README.md classes/_manifest.json glosario/README.md; then
            echo "::error::índice/manifest/glosario desactualizados. Ejecuta: python scripts/generar_indice.py && python scripts/generar_glosario.py"
            git diff --stat -- classes/README.md classes/_manifest.json glosario/README.md
            exit 1
          fi
          # La navegación entre clases es lo primero que se rompe al insertar o
          # reordenar una clase, y se rompe en silencio: los enlaces siguen
          # resolviendo, solo que a la clase equivocada.
          python scripts/generar_navegacion.py --check
          echo "Documentación generada sincronizada ✔"

      - name: Resumen
        if: always()
        run: |
          {
            echo "### 🎮 Programa de Desarrollo de Videojuegos Moderno"
            echo ""
            echo "- Partes construidas: **$(find classes -mindepth 1 -maxdepth 1 -type d -name 'parte-*' | wc -l)**"
            echo "- Clases construidas: **$(find classes -mindepth 3 -name README.md | wc -l)**"
          } >> "$GITHUB_STEP_SUMMARY"

  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint Markdown (markdownlint-cli2)
        run: npx --yes markdownlint-cli2 "**/*.md"

  generar-sitio:
    name: Build del sitio
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias del generador
        run: python -m pip install "markdown>=3.6"

      - name: Generar sitio (verifica que compila)
        run: python scripts/generar_sitio.py
