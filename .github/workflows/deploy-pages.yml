name: Deploy Pages

on:
  push:
    branches: ["main"]
    paths:
      - "classes/**/*.md"
      - "README.md"
      - "ROADMAP.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "scripts/generar_sitio.py"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Generar sitio
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias del generador
        run: python -m pip install "markdown>=3.6"

      - name: Generar HTML del currículo
        run: python scripts/generar_sitio.py

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Publicar
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
